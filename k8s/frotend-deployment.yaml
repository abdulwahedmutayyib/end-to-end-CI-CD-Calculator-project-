apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend-app

  template:
    metadata:
      labels:
        app: frontend-app

    spec:
      containers:
      - name: frontend-app
        image: wahed1321/calculator-frontend:latest

        ports:
        - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"

            limits:
             memory: "128Mi"
             cpu: "200m"
